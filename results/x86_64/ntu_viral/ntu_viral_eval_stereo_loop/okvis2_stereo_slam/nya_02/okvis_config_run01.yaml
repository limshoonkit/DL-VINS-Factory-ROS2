%YAML:1.0
# OKVIS2 config — NTU-VIRAL stereo-inertial.
# cam0 = right (/right/image_raw), cam1 = left (/left/image_raw), IMU = /imu/imu.
# Intrinsics from VINS-Fusion camRight/camLeft.yaml; T_SC = VINS body_T_cam0/1
# (match DL-VINS ntu_viral extrinsics).
cameras:
     - {T_SC:
        [-0.01916508, -0.01496218,  0.99970437,  0.00519443,
          0.99974371,  0.01176483,  0.01934191,  0.13478020,
         -0.01205075,  0.99981884,  0.01473287,  0.01465067,
          0.0, 0.0, 0.0, 1.0],
        image_dimension: [752, 480],
        distortion_coefficients: [-0.300267420221178, 0.090544063693053, 3.330220891093334e-05, 8.989607188457415e-05],
        distortion_type: radialtangential,
        focal_length: [431.3364265799752, 432.7527965378035],
        principal_point: [354.8956286992647, 232.5508916495161],
        camera_type: gray,
        slam_use: okvis}

     - {T_SC:
        [ 0.02183084, -0.01312053,  0.99967558,  0.00552943,
          0.99975965,  0.00230088, -0.02180248, -0.12431302,
         -0.00201407,  0.99991127,  0.01316761,  0.01614686,
          0.0, 0.0, 0.0, 1.0],
        image_dimension: [752, 480],
        distortion_coefficients: [-0.288105327549552, 0.074578284234601, 7.784489598138802e-04, -2.277853975035461e-04],
        distortion_type: radialtangential,
        focal_length: [425.0258563372763, 426.7976260903337],
        principal_point: [386.0151866550880, 241.9130336743440],
        camera_type: gray,
        slam_use: okvis}

camera_parameters:
    timestamp_tolerance: 0.005
    sync_cameras: [0, 1]
    image_delay: 0.0
    online_calibration:
        do_extrinsics: true
        do_extrinsics_final_ba: true
        sigma_r: 0.01
        sigma_alpha: 0.1
        sigma_r_final_ba: 0.03
        sigma_alpha_final_ba: 0.3

imu_parameters:
    use: true
    a_max: 176.0
    g_max: 7.8
    sigma_g_c: 1.0e-3
    sigma_a_c: 1.2e-2
    sigma_bg: 0.01
    sigma_ba: 0.1
    sigma_gw_c: 6.0e-6
    sigma_aw_c: 1.6e-3
    g: 9.81007
    g0: [ 0.0, 0.0, 0.0 ]
    a0: [ 0.0, 0.0, 0.0 ]
    T_BS:
        [1.0000, 0.0000, 0.0000, 0.0000,
         0.0000, 1.0000, 0.0000, 0.0000,
         0.0000, 0.0000, 1.0000, 0.0000,
         0.0000, 0.0000, 0.0000, 1.0000]

frontend_parameters:
    detection_threshold: 38.0
    absolute_threshold: 150.0
    matching_threshold: 60.0
    octaves: 0
    max_num_keypoints: 700
    keyframe_overlap: 0.60
    use_cnn: true
    parallelise_detection: true
    num_matching_threads: 4

estimator_parameters:
    num_keyframes: 5
    num_loop_closure_frames: 3
    num_imu_frames: 3
    do_loop_closures: true
    do_final_ba: false
    enforce_realtime: true
    realtime_min_iterations: 3
    realtime_max_iterations: 10
    realtime_time_limit: 0.07
    realtime_num_threads: 3
    full_graph_iterations: 15
    full_graph_num_threads: 3
    p_dbow: 0.4
    drift_percentage_heuristic: 1.35

output_parameters:
    display_matches: false
    display_overhead: false
