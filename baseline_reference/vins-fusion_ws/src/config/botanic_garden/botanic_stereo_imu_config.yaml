%YAML:1.0

#common parameters
#support: 1 imu 1 cam; 1 imu 2 cam: 2 cam;
imu: 1
num_of_cam: 2

imu_topic: "/imu/data"
image0_topic: "/dalsa_gray/left/image_raw"
image1_topic: "/dalsa_gray/right/image_raw"
output_path: "/tmp/vins_output/"

cam0_calib: "dalsa_cam0_pinhole_down.yaml"
cam1_calib: "dalsa_cam1_pinhole_down.yaml"
image_width: 960
image_height: 600

# GPU acceleration
use_gpu         : 0
use_gpu_acc_flow: 0
use_gpu_ceres   : 0


# Extrinsic parameter between IMU and Camera.
estimate_extrinsic: 0   # 0  Have an accurate extrinsic parameters. We will trust the following imu^R_cam, imu^T_cam, don't change it.
                        # 1  Have an initial guess about extrinsic parameters. We will optimize around your initial guess.

# Botanic gray stereo from official calib_chain.yaml (Kalibr) T_xsens_gray0/gray1
# (baseline ~0.254 m); consistent across DL-VINS / VINS-Fusion / OKVIS2.
body_T_cam0: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [-0.00375313, 0.01609339, 0.99986345, 0.17517298,
      -0.99997267, -0.00642959, -0.00365005, 0.13259005,
      0.00636997, -0.99984982, 0.01611708, 0.0670137,
      0.0, 0.0, 0.0, 1.0]

body_T_cam1: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [-0.00406537, 0.0128982, 0.99990855, 0.17295013,
      -0.99998236, -0.00438248, -0.00400914, -0.12155995,
      0.00433036, -0.99990721, 0.01291578, 0.06682273,
      0.0, 0.0, 0.0, 1.0]

#Multiple thread support
multiple_thread: 4

#feature traker paprameters
max_cnt: 150            # max feature number in feature tracking
min_dist: 30            # min distance between two features
freq: 0                # frequence (Hz) of publish tracking result. At least 10Hz for good estimation. If set 0, the frequence will be same as raw image
F_threshold: 1.0        # ransac threshold (pixel)
show_track: 1           # publish tracking image as topic
flow_back: 1            # perform forward and backward optical flow to improve feature tracking accuracy

#optimization parameters
max_solver_time: 0.04  # max solver itration time (ms), to guarantee real time
max_num_iterations: 8  # max solver itrations, to guarantee real time
keyframe_parallax: 10.0 # keyframe selection threshold (pixel)

#imu parameters
acc_n: 0.01          # accelerometer measurement noise standard deviation.
gyr_n: 0.002         # gyroscope measurement noise standard deviation.
acc_w: 0.00003        # accelerometer bias random work noise standard deviation.
gyr_w: 0.00008       # gyroscope bias random work noise standard deviation.
g_norm: 9.81007     # gravity magnitude

#unsynchronization parameters
estimate_td: 0                      # online estimate time offset between camera and imu
td: 0.0                             # initial value of time offset. unit: s. readed image clock + td = real image clock (IMU clock)

#loop closure parameters
load_previous_pose_graph: 0        # load and reuse previous pose graph; load from 'pose_graph_save_path'
pose_graph_save_path: "/tmp/vins_output/pose_graph/" # save and load path
save_image: 0                  # save image in pose graph for visualization prupose; you can close this function by setting 0
