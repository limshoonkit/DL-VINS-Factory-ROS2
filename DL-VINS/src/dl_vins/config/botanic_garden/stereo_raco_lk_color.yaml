dl_vins_component:
  ros__parameters:
    # ===== Botanic Garden COLOR (RGB) — DL-VINS =====
    # Cameras: /dalsa_color/left|right (DALSA C1930, 960x600). Extrinsics from the
    # official calib_chain.yaml T_xsens_rgb0/rgb1
    gravity: 9.81007
    acc_noise: 0.01
    gyr_noise: 0.002
    acc_bias_noise: 0.00003
    gyr_bias_noise: 0.00008
    initial_td: 0.0
    max_iterations: 10
    max_solver_time: 0.04
    estimate_extrinsic: false
    num_threads: 6
    ceres_device: 0
    odom_frame_id: "odom"
    norm_focal_length: 0.0

    # IMU-Camera Extrinsics from official calib_chain.yaml (Kalibr), Xsens->cam, row-major 4x4
    # From official calib_chain.yaml (Kalibr) T_xsens_gray0/gray1. Stereo baseline ~0.254 m.
    body_T_cam0: [-0.00140533, -0.00896721, 0.99995881, 0.18377395,
             -0.99999022, 0.0042065, -0.00136765, 0.14789743,
             -0.00419407, -0.99995095, -0.00897304, -0.0087318,
             0.0, 0.0, 0.0, 1.0]
    body_T_cam1: [-0.00120822, -0.00094742, 0.99999882, 0.18313715,
             -0.99997156, 0.00744575, -0.00120114, -0.10587443,
             -0.00744461, -0.99997183, -0.00095639, -0.00933521,
             0.0, 0.0, 0.0, 1.0]

    # ===== Method-specific: RACO + LK (stereo) =====
    cam0_calib: "config/botanic_garden/dalsa_rgb0_pinhole_down.yaml"
    cam1_calib: "config/botanic_garden/dalsa_rgb1_pinhole_down.yaml"
    image_width: 960
    image_height: 600
    image_encoding: "bgr8"
    max_tracked_keypoints: 256
    enable_visualization: false
    enable_csv_logging: true
    log_folder: "./logs"
    feature_extraction_method: 4
    optflow_device: 0
    use_descriptor_matcher: false
    weights_folder: "weights/botanic_garden"
